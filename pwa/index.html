<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#0b0d10" />
    <title>Flock</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="stylesheet" href="/vendor/xterm.css" />
    <style>
      :root {
        --bg: #0b0d10;
        --bg-elev: #14171c;
        --border: #232830;
        --fg: #e6e9ef;
        --fg-muted: #9aa3b2;
        --fg-dim: #5b6472;
        --accent: #5b9dff;
        --warn: #f0b429;
        --ok: #3ecf8e;
      }
      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      html, body {
        margin: 0;
        background: var(--bg);
        color: var(--fg);
        font: 14px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        height: 100%;
      }
      header {
        position: sticky;
        top: 0;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: max(env(safe-area-inset-top), 12px) 16px 12px;
        background: rgba(11, 13, 16, 0.85);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--border);
        font-weight: 600;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        font-size: 12px;
        color: var(--fg-muted);
      }
      header .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
      header .count { margin-left: auto; text-transform: none; color: var(--warn); font-weight: 600; }
      header .new-task { margin-left: 10px; width: 28px; height: 28px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-elev); color: var(--accent); font-size: 18px; line-height: 1; }
      header .count:not(:empty) + .new-task { margin-left: 10px; }
      header .new-task:only-of-type { margin-left: auto; }
      .form-screen { position: fixed; inset: 0; z-index: 10; display: flex; flex-direction: column; background: var(--bg); }
      .form-screen .form-body { padding: 16px; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; }
      .form-screen label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--fg-dim); }
      .form-screen select, .form-screen textarea { width: 100%; background: var(--bg-elev); border: 1px solid var(--border); border-radius: 8px; padding: 10px; color: var(--fg); font-size: 15px; }
      .form-screen textarea { min-height: 120px; resize: vertical; font-family: inherit; }
      .form-screen .actions { display: flex; gap: 8px; padding-top: 4px; }
      .form-screen .actions button { flex: 1; padding: 12px; border-radius: 8px; border: none; font-weight: 600; font-size: 14px; }
      .form-screen .actions .create { background: var(--accent); color: #000; }
      .form-screen .actions .cancel { background: var(--bg-elev); color: var(--fg-muted); border: 1px solid var(--border); }
      main { padding: 8px 12px 40px; }
      .repo { margin: 14px 4px 6px; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--fg-dim); }
      .wt {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 14px;
        margin: 6px 0;
        background: var(--bg-elev);
        border: 1px solid var(--border);
        border-radius: 12px;
      }
      .wt.needs_input { border-color: rgba(240, 180, 41, 0.5); }
      .wt .status { width: 9px; height: 9px; border-radius: 50%; flex: none; background: var(--fg-dim); }
      .wt .status.working { background: var(--accent); }
      .wt .status.idle { background: var(--fg-dim); opacity: 0.5; }
      .wt .status.needs_input { background: var(--warn); animation: pulse 1.4s ease-in-out infinite; }
      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }
      .wt .body { min-width: 0; flex: 1; }
      .wt .title { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .wt.needs_input .title { color: var(--fg); }
      .wt .branch { font-family: ui-monospace, monospace; font-size: 11px; color: var(--fg-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .empty, .offline { text-align: center; color: var(--fg-dim); padding: 60px 24px; }
      .offline { display: none; }
      .token-prompt { padding: 40px 24px; text-align: center; color: var(--fg-muted); }
      .token-prompt input { width: 100%; margin-top: 12px; padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-elev); color: var(--fg); font-family: ui-monospace, monospace; }
      .token-prompt button { margin-top: 12px; padding: 10px 18px; border-radius: 8px; border: none; background: var(--accent); color: #000; font-weight: 600; }
      .push-banner { width: 100%; margin: 8px 0; padding: 12px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg-elev); color: var(--accent); font-weight: 600; font-size: 13px; }
      .wt { cursor: pointer; }
      .wt .chev { color: var(--fg-dim); font-size: 18px; }
      .term-screen { position: fixed; inset: 0; display: flex; flex-direction: column; background: #000; z-index: 10; }
      .term-header { display: flex; align-items: center; gap: 10px; padding: max(env(safe-area-inset-top), 12px) 14px 10px; background: var(--bg-elev); border-bottom: 1px solid var(--border); }
      .term-header .back { background: none; border: none; color: var(--accent); font-size: 15px; padding: 4px 6px; }
      .term-header .t { min-width: 0; font-weight: 600; font-size: 13px; color: var(--fg); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .term-host { flex: 1; min-height: 0; padding: 6px; overflow: hidden; }
      .term-keys { display: flex; gap: 6px; padding: 6px 10px; background: var(--bg-elev); border-top: 1px solid var(--border); overflow-x: auto; }
      .term-keys button { flex: none; min-width: 40px; padding: 8px 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--fg-muted); font-size: 13px; }
      .term-keys button:active { background: var(--accent); color: #000; }
      .term-compose { display: flex; gap: 8px; padding: 8px 10px calc(env(safe-area-inset-bottom) + 8px); background: var(--bg-elev); border-top: 1px solid var(--border); }
      .term-compose input { flex: 1; min-width: 0; padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--fg); font-size: 15px; }
      .term-compose button { flex: none; padding: 10px 16px; border-radius: 8px; border: none; background: var(--accent); color: #000; font-weight: 600; }
      .term-header .to-reader, .term-header .to-term { margin-left: auto; background: none; border: none; font-size: 18px; padding: 4px 6px; }
      .reader-screen { position: fixed; inset: 0; z-index: 10; display: flex; flex-direction: column; background: var(--bg); }
      .reader-msgs { flex: 1; min-height: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 12px; display: flex; flex-direction: column; gap: 10px; }
      .reader-msgs .msg { max-width: 88%; padding: 9px 12px; border-radius: 14px; font-size: 14px; line-height: 1.4; white-space: pre-wrap; word-break: break-word; }
      .reader-msgs .msg.user { align-self: flex-end; background: var(--accent); color: #000; border-bottom-right-radius: 4px; }
      .reader-msgs .msg.assistant { align-self: flex-start; background: var(--bg-elev); color: var(--fg); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
      .reader-msgs .msg pre { white-space: pre-wrap; word-break: break-word; background: rgba(0,0,0,0.35); border-radius: 8px; padding: 8px; margin: 6px 0; font-family: ui-monospace, Menlo, monospace; font-size: 12px; overflow-x: auto; }
      .reader-msgs .msg code { font-family: ui-monospace, Menlo, monospace; font-size: 12.5px; background: rgba(0,0,0,0.3); padding: 1px 4px; border-radius: 4px; }
      .reader-msgs .msg.user code, .reader-msgs .msg.user pre { background: rgba(255,255,255,0.2); }
    </style>
  </head>
  <body>
    <header>
      <span class="dot"></span>
      <span>Flock</span>
      <span class="count" id="count"></span>
      <button class="new-task" id="new-task-btn" title="New task" hidden>＋</button>
    </header>
    <main id="main">
      <div class="empty" id="loading">Connecting…</div>
    </main>
    <script src="/vendor/xterm.js"></script>
    <script src="/vendor/addon-fit.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
